name: Space Job Tracker

on:
  # Esegui ogni giorno alle 08:00 ora italiana (07:00 UTC in orario solare, 06:00 in ora legale)
  # Modifica l'orario a tuo piacimento: https://crontab.guru
  schedule:
    - cron: "30 6 * * *"

  # Permette di eseguire manualmente dal tab Actions su GitHub
  workflow_dispatch:

jobs:
  check-jobs:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Necessario per committare seen_jobs.json

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # Usa il token con permessi di scrittura
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run job scraper
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scraper.py

      - name: Commit seen_jobs.json (salva stato)
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add seen_jobs.json
          # Committa solo se il file è cambiato
          git diff --staged --quiet || git commit -m "chore: aggiorna seen_jobs.json [skip ci]"
          git push
